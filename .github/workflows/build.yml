name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      apps_json:
        description: >
          JSON array of Frappe apps to install, e.g.
          [{"url":"https://github.com/frappe/erpnext.git","branch":"version-15"}].
          Leave empty to use the defaults defined in apps.json.
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Resolve which apps to install: prefer the workflow-dispatch input,
      # fall back to the committed apps.json file.
      - name: Prepare apps JSON
        id: apps
        env:
          APPS_JSON_INPUT: ${{ inputs.apps_json }}
        run: |
          if [ -n "$APPS_JSON_INPUT" ]; then
            APPS_JSON="$APPS_JSON_INPUT"
          else
            APPS_JSON=$(cat apps.json)
          fi
          # Use Python for portable base64 encoding (avoids GNU/BSD flag differences).
          B64=$(echo "$APPS_JSON" | python3 -c "import base64,sys; print(base64.b64encode(sys.stdin.buffer.read()).decode(), end='')")
          echo "apps_json_base64=$B64" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APPS_JSON_BASE64=${{ steps.apps.outputs.apps_json_base64 }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
