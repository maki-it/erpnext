name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      frappe_version:
        description: >
          Frappe/ERPNext major version branch used for the build
          (e.g. version-16, version-15). Defaults to version-16.
        required: false
        default: version-16
        type: string
      apps_json:
        description: >
          JSON array of Frappe apps to install, e.g.
          [{"url":"https://github.com/frappe/erpnext.git","version":"v16.12.0"}].
          Leave empty to use the defaults defined in apps.json.
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Resolve which apps to install: prefer the workflow-dispatch input,
      # fall back to the committed apps.json file.
      - name: Prepare apps JSON
        env:
          APPS_JSON_INPUT: ${{ inputs.apps_json }}
        run: |
          if [ -n "$APPS_JSON_INPUT" ]; then
            echo "$APPS_JSON_INPUT" > apps.json
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Download easy-install.py
        # Pin to a specific commit or verify the checksum in production environments.
        run: curl -fsSL https://raw.githubusercontent.com/frappe/bench/develop/easy-install.py -o easy-install.py

      - name: Build and push image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          FRAPPE_BRANCH: ${{ inputs.frappe_version || 'version-16' }}
          SHOULD_PUSH: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        run: python3 .github/scripts/build.py
