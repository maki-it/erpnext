name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      frappe_version:
        description: >
          Frappe/ERPNext major version branch used for the build
          (e.g. version-16, version-15). Defaults to version-16.
        required: false
        default: version-16
        type: string
      apps_json:
        description: >
          JSON array of Frappe apps to install, e.g.
          [{"url":"https://github.com/frappe/erpnext.git","version":"v16.12.0"}].
          Leave empty to use the defaults defined in apps.json.
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      # Resolve which apps to install: prefer the workflow-dispatch input,
      # fall back to the committed apps.json file.
      - name: Prepare apps JSON
        env:
          APPS_JSON_INPUT: ${{ inputs.apps_json }}
        run: |
          if [ -n "$APPS_JSON_INPUT" ]; then
            echo "$APPS_JSON_INPUT" > apps.json
          fi
          
          echo "APPS_JSON_BASE64=$(base64 -w 0 apps.json)" >> $GITHUB_ENV

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          file: frappe_docker/images/layered/Containerfile
          context: frappe_docker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_VERSION=${{ inputs.frappe_version }}
            APPS_JSON_BASE64=${{ env.APP_JSON_BASE64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
