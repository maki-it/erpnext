name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      # Resolve which apps to install: prefer the workflow-dispatch input,
      # fall back to the committed apps.json file.
      - name: Prepare apps JSON
        run: |
          echo "APPS_JSON=$(jq -c '.' apps.json)" >> $GITHUB_ENV
          echo "APPS_JSON_BASE64=$(base64 -w 0 apps.json)" >> $GITHUB_ENV
          echo "FRAPPE_VERSION=$(cat frappe-version.txt)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          labels: |
            frappe.version=${{ env.FRAPPE_VERSION }}
            frappe.apps=${{ env.APPS_JSON }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          file: frappe_docker/images/layered/Containerfile
          context: frappe_docker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            FRAPPE_VERSION=${{ env.FRAPPE_VERSION  }}
            APPS_JSON_BASE64=${{ env.APP_JSON_BASE64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
